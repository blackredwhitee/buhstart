<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet><link rel="stylesheet" href="fonts.css"><style>body{margin:0;background:#fff;font-family:'Golos Text',system-ui,sans-serif} a{color:#F07828} a:hover{color:#E56800}</style></helmet>
<div style="font-family:'Golos Text',system-ui,sans-serif;color:#1A1A1A">
<dc-import name="SiteHeader" hint-size="100%,72px"></dc-import>

<section style="max-width:1100px;margin:0 auto;padding:60px 24px 48px">
  <div style="font-size:13px;color:#6B6B6B;margin-bottom:16px"><a href="index.dc.html" style="color:#6B6B6B;text-decoration:none" style-hover="color:#F07828">Главная</a> / Услуги</div>
  <h1 style="margin:0 0 14px;font-size:44px;font-weight:800;letter-spacing:-0.02em">Бухгалтерские услуги</h1>
  <p style="margin:0;font-size:17px;color:#6B6B6B;max-width:560px;line-height:1.6">Полный цикл бухгалтерского сопровождения — от регистрации до отчётности.</p>
</section>

<section style="max-width:1100px;margin:0 auto;padding:0 24px 72px">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px">
  <sc-for list="{{ services }}" as="s" hint-placeholder-count="6">
    <a href="{{ s.href }}" style="text-decoration:none;color:#1A1A1A;background:#fff;border:1px solid #E8E8E8;border-radius:10px;padding:26px 24px;display:block;transition:all 150ms ease;border-bottom:3px solid #E8E8E8" style-hover="box-shadow:0 4px 20px rgba(0,0,0,0.1);transform:translateY(-2px);border-bottom-color:#F07828">
      <div style="width:40px;height:40px;border-radius:8px;background:#FEF0E6;color:#F07828;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;margin-bottom:16px">{{ s.glyph }}</div>
      <div style="font-size:19px;font-weight:600;margin-bottom:8px">{{ s.name }}</div>
      <div style="font-size:13px;line-height:1.6;color:#6B6B6B;margin-bottom:12px">{{ s.desc }}</div>
      <div style="font-size:13px;font-weight:600;color:#F07828">Подробнее →</div>
    </a>
  </sc-for>
  </div>
</section>

<section style="background:#3D3D3D">
  <div style="max-width:1100px;margin:0 auto;padding:64px 24px;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap">
    <div style="color:#fff">
      <h2 style="margin:0 0 10px;font-size:32px;font-weight:800;letter-spacing:-0.02em">Не знаете, что подходит?</h2>
      <p style="margin:0;font-size:16px;color:rgba(255,255,255,0.7)">Ответьте на 9 вопросов — подберём оптимальный пакет под вашу ситуацию.</p>
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap">
      <a href="calculator.dc.html" style="text-decoration:none;background:#F07828;color:#fff;font-weight:600;font-size:16px;height:52px;padding:0 26px;border-radius:6px;display:inline-flex;align-items:center;transition:all 120ms ease" style-hover="background:#E56800;transform:translateY(-1px)">Пройти калькулятор</a>
      <a href="tel:+74955070979" style="text-decoration:none;border:1.5px solid rgba(255,255,255,0.5);color:#fff;font-weight:600;font-size:16px;height:52px;padding:0 26px;border-radius:6px;display:inline-flex;align-items:center;transition:all 120ms ease" style-hover="background:#fff;color:#3D3D3D">Позвонить</a>
    </div>
  </div>
</section>

<dc-import name="SiteFooter" hint-size="100%,420px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      services: [
        { glyph: '₽', name: 'Бухгалтерское обслуживание', desc: 'Полное ведение учёта, отчётность в ФНС и фонды, банк-клиент.', href: 'usluga.dc.html?s=bukhgalterskoe-obsluzhivanie' },
        { glyph: '%', name: 'Налоговое консультирование', desc: 'Оптимизация налогов, выбор системы, ответы на требования ФНС.', href: 'usluga.dc.html?s=nalogovoe-konsultirovanie' },
        { glyph: 'К', name: 'Кадровый учёт', desc: 'Приём и увольнение, отпуска, больничные, воинский учёт.', href: 'usluga.dc.html?s=kadrovyi-uchet' },
        { glyph: 'У', name: 'Управленческий учёт', desc: 'P&L, ДДС, платёжный календарь — цифры для решений.', href: 'usluga.dc.html?s=upravlencheskii-uchet' },
        { glyph: 'В', name: 'ВЭД', desc: 'Валютный контроль, импорт/экспорт, работа с нерезидентами.', href: 'usluga.dc.html?s=ved' },
        { glyph: 'Р', name: 'Регистрация и ликвидация', desc: 'Откроем ИП или ООО за 3 дня, закроем без долгов и штрафов.', href: 'usluga.dc.html?s=registraciya-i-likvidaciya' },
      ],
    };
  }
}
</script>
</body>
</html>
